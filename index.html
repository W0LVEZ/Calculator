<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="style.css"></script>
    <script src="app.js"></script>
    <title>Calculator</title>
</head>
<body>
    <div id="title"><h1>Calculator</h1></div>
    <div class="calcuBody">
        <div class="calcuScreen"></div>
        <div class="calcuButtons">
            <div class="calcuOperators">
                <button class="Add">/</button>
                <button class="Add">*</button>
                <button class="Add">-</button>
                <button class="Add">+</button>
                <button class="Add">=</button>
            </div>
            <div class="calcuNums">
                <button>0</button>
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button>7</button>
                <button>8</button>
                <button>9</button>
            </div>
        </div>
    </div>
    
</body>
</html>
